<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treks | See My India</title>
    <link rel="stylesheet" href="../src/styles.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&family=Caveat:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        .nav-back-corner {
            position: fixed;
            top: 25px;
            left: 30px;
            color: #8fa08e;
            text-decoration: none;
            z-index: 1000;
            transition: color 0.3s;
        }

        .nav-back-corner:hover {
            color: #d32f2f;
        }
    </style>
</head>

<body>
    <div class="background-mesh"></div>
    <a href="../index.html" class="nav-back-corner">&larr; Home</a>
    <header>
        <div class="logo">
            <a href="../index.html" style="text-decoration: none;">
                <h1>India: Curated</h1>
                <p>The Ultimate Bucket List</p>
            </a>
        </div>
        <nav style="margin-top: 1.5rem; display: flex; gap: 1rem; justify-content: center;">
            <!-- <a href="../index.html" class="nav-button">🗺️ Interactive Map</a>
            <a href="../places.html" class="nav-button">📋 List View</a> -->
        </nav>
    </header>

    <main>
        <div class="place-hero">
            
            <img src="https://images.unsplash.com/photo-1524492412937-b28074a5d7da?auto=format&fit=crop&w=1000&q=80" alt="Treks" loading="lazy">
            <div class="hero-content">
                <h1>Treks</h1>
                <p>Explore the amazing destinations in Treks.</p>
                
            </div>
        
        </div>

        <div class="sub-places-section">
            <h2 class="section-title">Explore Locations in Treks</h2>
            <div class="grid-container">
                
        <article class="place-card" data-state="West Bengal">
            <div class="card-image">
                <img src="../assets/no-image-symbol.jpg" alt="Sandakphu Trek" loading="lazy">
            </div>
            <div class="card-content">
                <h2 class="card-title">Sandakphu Trek</h2>
                <p class="card-description">No description provided.</p>
                
                <div class="card-actions" style="margin-top: 1rem;">
                    <a href="west-bengal-sandakphu-trek.html" class="btn-google" style="background:var(--accent-color); color:#fff;">Explore Details →</a>
                </div>
            </div>
        </article>
    
            </div>
        </div>
    </main>

    <footer>
        <p>Curated with ❤️ for India by Dipankar Pal.</p>
    </footer>
    <button id="theme-toggle" class="theme-toggle-btn">🌓</button>
    <script>
        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        });
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }
    </script>
</body>

</html>
