<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- INJECT_TITLE -->
    <link rel="stylesheet" href="../src/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="decorative-ribbon"></div>
    <div class="background-mesh"></div>
    <a href="../places.html" class="nav-back-corner" onclick="window.history.back(); return false;">&larr; Go Back</a>
    <header>
        <div class="logo">
            <a href="../index.html" style="text-decoration: none;">
                <h1>India: Curated</h1>
                <p>The Ultimate Bucket List</p>
            </a>
        </div>
    </header>
    <main>
        <div class="place-hero">
            <!-- INJECT_PLACE_HERO -->
        </div>
    </main>
    <footer>
        <p>Curated with ❤️ for India by Dipankar Pal.</p>
    </footer>
    <button id="theme-toggle" class="theme-toggle-btn">🌓</button>
    <script>
        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        });
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }
    </script>
</body>
</html>
