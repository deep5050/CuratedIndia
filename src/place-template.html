<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- INJECT_TITLE -->
    <link rel="stylesheet" href="../src/styles.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&family=Caveat:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        .nav-back-corner {
            position: fixed;
            top: 25px;
            left: 30px;
            color: #8fa08e;
            text-decoration: none;
            z-index: 1000;
            transition: color 0.3s;
        }

        .nav-back-corner:hover {
            color: #d32f2f;
        }
    </style>
</head>

<body>
    <div class="background-mesh"></div>
    <a href="../index.html" class="nav-back-corner">&larr; Home</a>
    <header>
        <div class="logo">
            <a href="../index.html" style="text-decoration: none;">
                <h1>India: Curated</h1>
                <p>The Ultimate Bucket List</p>
            </a>
        </div>
        <nav style="margin-top: 1.5rem; display: flex; gap: 1rem; justify-content: center;">
            <!-- <a href="../index.html" class="nav-button">🗺️ Interactive Map</a>
            <a href="../places.html" class="nav-button">📋 List View</a> -->
        </nav>
    </header>

    <main>
        <div class="place-hero">
            <!-- INJECT_PLACE_HERO -->
        </div>

        <div class="sub-places-section">
            <h2 class="section-title">Explore Locations in <!-- INJECT_PLACE_NAME --></h2>
            <div class="grid-container">
                <!-- INJECT_SUB_CARDS -->
            </div>
        </div>
    </main>

    <footer>
        <p>Curated with ❤️ for India by Dipankar Pal.</p>
    </footer>
    <button id="theme-toggle" class="theme-toggle-btn">🌓</button>
    <script>
        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        });
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }
    </script>
</body>

</html>
