<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India: Curated | The Ultimate Bucket List</title>
    <meta name="description" content="A curated list of breathtaking places you must see in India before you die.">
    <link rel="stylesheet" href="src/styles.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&family=Caveat:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        .nav-back-corner {
            position: fixed;
            top: 25px;
            left: 30px;
            color: #8fa08e;
            text-decoration: none;
            z-index: 1000;
            transition: color 0.3s;
        }

        .nav-back-corner:hover {
            color: #d32f2f;
        }
    </style>
</head>

<body>
    <div class="background-mesh"></div>
    <a href="index.html" class="nav-back-corner">&larr; Home</a>
    <header>
        <div class="logo">
            <a href="index.html" style="text-decoration: none;">
                <h1>India: Curated</h1>
                <p id="state-subtitle">The Ultimate Bucket List</p>
            </a>
        </div>
        <!-- <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html" style="padding: 0.8rem 1.5rem; background: var(--accent-color); color: #000; font-weight: 600; text-decoration: none; border-radius: 4px; letter-spacing: 1px; text-transform: uppercase;">🗺️ Home</a>
        </div> -->
    </header>

    <main>
        <div class="grid-container" id="places-grid">
            <!-- INJECT_CARDS -->
        </div>
    </main>

    <footer>
        <p>Curated with ❤️ for India by Dipankar Pal.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.place-card');

            const urlParams = new URLSearchParams(window.location.search);
            const incomingState = urlParams.get('state');

            if (incomingState && incomingState.toLowerCase() !== 'all') {
                const subtitle = document.getElementById('state-subtitle');
                if (subtitle) {
                    subtitle.textContent = `Destinations in ${incomingState}`;
                }
            }

            cards.forEach(card => {
                if (!incomingState || incomingState.toLowerCase() === 'all' || card.getAttribute('data-state').toLowerCase() === incomingState.toLowerCase()) {
                    card.style.display = 'flex';
                    setTimeout(() => card.style.opacity = '1', 50);
                } else {
                    card.style.display = 'none';
                    card.style.opacity = '0';
                }
            });
        });
    </script>
    <button id="theme-toggle" class="theme-toggle-btn">🌓</button>
    <script>
        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        });
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }
    </script>
</body>

</html>
